<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>手機記帳本(一頁式)</title>
    <style>
        body { font-family: sans-serif; padding: 1em; background: #f0f0f0; }
        h1, h2 { text-align: center; }
        form, .stats, .tools { margin-bottom: 1em; }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            display: inline-flex;
            align-items: center;
            box-sizing: border-box;
            position: relative;
            border: 2px solid #333030;
            height: 40px;
            min-width: 50px;
            font-size: 14px;
        }
        .entry-list {
            padding: 0;
        }
        .entry-list li {
            background: #fff;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
        }
        .income { color: green; }
        .expense { color: red; }
        .tools button { margin-bottom: 5px; }
        .btn-del {
            padding: 5px;
            background: red;
            color: white;
            font-size: 12px;
            border-radius: 5px;
            border: 1px solid #ccc;
            cursor: pointer;
            user-select: none;
        }
        .btn {
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            justify-content: center;
            cursor: pointer;
        }
        .wrapper {
            flex-wrap: wrap;
            margin-top: 5px;
            display: flex;
            border: 2px solid #333;
            padding: 10px;
            border-radius: 8px;
            gap: 10px;
        }
        .item {
            padding: 10px;
            background-color: #eee;
            border: 1px solid #ccc;
            text-align: center;
            border-radius: 8px;
            width: calc((100% - 20px) / 3);
        }
        .total-balance {
            padding: 0;
        }
        .total-balance li {
            list-style: none;
            text-align: left;
            font-size: 18px;
            font-weight: bold;
        }
        .mb1 {
            margin-bottom: 1em;
        }
        .mt1 {
            margin-top: 1em;
        }
        .footer {
            margin-top: 3em;
        }
        .cloud-panel {
            background: #ffffff;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 12px;
            margin-top: 1em;
            margin-bottom: 1em;
        }
        .cloud-status {
            margin-top: 8px;
            font-size: 13px;
            line-height: 1.5;
            color: #333;
        }
        .status-ok {
            color: #0d7a1e;
            font-weight: bold;
        }
        .status-error {
            color: #b30000;
            font-weight: bold;
        }
        .small-note {
            margin-top: 6px;
            font-size: 12px;
            color: #444;
        }
        @media (max-width: 768px) {
            .item {
                width: calc((100% - 10px) / 2);
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script async defer src="https://accounts.google.com/gsi/client"></script>
    <script async defer src="https://apis.google.com/js/api.js"></script>
</head>
<body>

<h1>手機記帳本</h1>
<ul id="totalBalance" class="total-balance"></ul>

<div class="mb1">
    <label for="calendar">選擇月份</label>
    <input type="month" id="calendar">
    <button id="showAllBtn" class="btn" type="button">全部顯示</button>
</div>

<form id="entryForm">
    <input type="date" id="entryDate" required>
    <input type="text" id="desc" placeholder="項目描述" required>
    <input type="number" id="amount" placeholder="金額" required>
    <select id="type">
        <option value="income">收入</option>
        <option value="expense">支出</option>
    </select>
    <select id="category">
        <option value="餐飲">餐飲</option>
        <option value="交通">交通</option>
        <option value="娛樂">娛樂</option>
        <option value="生活">生活</option>
        <option value="其他">其他</option>
    </select>
    <button class="btn" type="submit">新增記錄</button>
</form>

<div class="mb1">
    <label for="newCategory">新增分類（會依收入/支出分類）</label>
    <select id="categoryType">
        <option value="income">收入</option>
        <option value="expense">支出</option>
    </select>
    <input type="text" id="newCategory" placeholder="輸入分類名稱">
    <button id="addCategoryBtn" class="btn" type="button">新增分類</button>
</div>

<div class="mt1">
    <label for="manageType">管理分類（依類型）</label>
    <select id="manageType">
        <option value="income">收入</option>
        <option value="expense">支出</option>
    </select>
    <div id="categoryManagerList" class="wrapper"></div>
</div>

<div class="tools">
    <button id="exportCsvBtn" class="btn" type="button">匯出 CSV</button>
</div>

<h2>收支分類圖表</h2>
<canvas id="categoryChart" style="max-width: 100%; height: 300px;"></canvas>

<h2><span id="monthStatsShow"></span> 月統計</h2>
<div class="stats" id="monthlyStats"></div>

<div style="margin-bottom: 1em;">
    <label for="searchInput">搜尋記錄</label>
    <input type="text" id="searchInput" placeholder="輸入關鍵字…">
</div>

<h2>記帳紀錄</h2>
<ul id="entryList" class="entry-list"></ul>

<footer class="footer">
    <hr>
    <div style="text-align: center">
        <a href="https://github.com/AIKULIN/mobile_ledger" target="_blank" rel="noopener noreferrer">
            <img alt="Static Badge" src="https://img.shields.io/badge/%E6%89%8B%E6%A9%9F%E8%A8%98%E5%B8%B3%E6%9C%AC-2025%C2%A9%20By%20AIKULIN-blue?style=for-the-badge&logo=github">
        </a>
    </div>
</footer>

<div class="cloud-panel">
    <label>Google 雲端同步（自動備份）</label>
    <button id="googleConnectBtn" class="btn" type="button">連線 Google 並啟用自動備份</button>
    <button id="syncNowBtn" class="btn" type="button">立即同步到雲端</button>
    <label for="cloudBackupSelect">選擇雲端備份（最近 15 筆）</label>
    <select id="cloudBackupSelect">
        <option value="">尚未載入雲端備份</option>
    </select>
    <button id="restoreFromCloudBtn" class="btn" type="button">從雲端還原</button>
    <button id="googleDisconnectBtn" class="btn" type="button">中斷自動同步並登出授權</button>
    <div id="cloudStatus" class="cloud-status">尚未設定 Google 同步。</div>
    <div id="googleAccountInfo" class="small-note">目前帳號：尚未連線</div>
    <div class="small-note">備份位置為你的 Google Drive「我的雲端硬碟」內專用資料夾，可在 drive.google.com 看到。</div>
</div>

<script type="application/javascript">
    const STORAGE_KEYS = {
        entries: 'encrypted_entries',
        localUpdatedAt: 'ledger_local_updated_at',
        googleAutoSyncEnabled: 'google_auto_sync_enabled',
        googleLoginHint: 'google_login_hint'
    };

    // Fill these in directly when deploying this single-file app.
    const GOOGLE_OAUTH_CLIENT_ID = '';
    const GOOGLE_API_KEY = '';
    const GOOGLE_ACCOUNT_SCOPE = 'openid email profile';
    const GOOGLE_DRIVE_SCOPE = `https://www.googleapis.com/auth/drive.file ${GOOGLE_ACCOUNT_SCOPE}`;
    const GOOGLE_DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
    const GOOGLE_USERINFO_ENDPOINT = 'https://openidconnect.googleapis.com/v1/userinfo';
    const CLOUD_BACKUP_FOLDER_NAME = 'Mobile Ledger Backup';
    const CLOUD_BACKUP_FILE_PREFIX = 'mobile_ledger_backup_';
    const CLOUD_BACKUP_FILE_SUFFIX = '.json';

    const defaultIncomeCategories = ['薪資', '投資', '其他'];
    const defaultExpenseCategories = ['餐飲', '交通', '娛樂', '生活'];

    const form = document.getElementById('entryForm');
    const entryList = document.getElementById('entryList');
    const statsBox = document.getElementById('monthlyStats');
    const totalBalanceEl = document.getElementById('totalBalance');
    const monthStatsShowEl = document.getElementById('monthStatsShow');

    const descInput = document.getElementById('desc');
    const amountInput = document.getElementById('amount');
    const typeSelect = document.getElementById('type');
    const categorySelect = document.getElementById('category');
    const dateInput = document.getElementById('entryDate');

    const calendarInput = document.getElementById('calendar');
    const searchInput = document.getElementById('searchInput');
    const manageTypeSelect = document.getElementById('manageType');
    const newCategoryTypeSelect = document.getElementById('categoryType');

    const cloudStatusEl = document.getElementById('cloudStatus');
    const googleAccountInfoEl = document.getElementById('googleAccountInfo');
    const cloudBackupSelectEl = document.getElementById('cloudBackupSelect');

    let entries = loadEntries();
    let cloudFolderId = null;
    let cloudFileId = null;
    let gapiClientReady = false;
    let tokenClient = null;
    let tokenClientClientId = '';
    let accessToken = '';
    let currentGoogleUser = null;
    let autoCloudBackupEnabled = false;
    let cloudBackupTimer = null;
    let cloudSyncInProgress = false;
    let cloudBackupFiles = [];

    function encode(str) {
        const bytes = new TextEncoder().encode(str);
        let binary = '';
        bytes.forEach(byte => {
            binary += String.fromCharCode(byte);
        });
        return btoa(binary);
    }

    function decode(base64Value) {
        const binary = atob(base64Value);
        const bytes = Uint8Array.from(binary, char => char.charCodeAt(0));
        return new TextDecoder().decode(bytes);
    }

    function safeJsonParse(raw, fallback) {
        try {
            return JSON.parse(raw);
        } catch (error) {
            return fallback;
        }
    }

    function normalizeEntry(raw) {
        if (!raw || typeof raw !== 'object') return null;

        const desc = String(raw.desc || '').trim();
        const amount = Number(raw.amount);
        const type = raw.type === 'income' ? 'income' : 'expense';
        const category = String(raw.category || (type === 'income' ? '其他' : '生活')).trim();

        let date = String(raw.date || '').trim();
        if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) {
            date = new Date().toISOString().slice(0, 10);
        }

        if (!desc || !Number.isFinite(amount)) return null;
        return { desc, amount, type, category, date };
    }

    function loadEntries() {
        const raw = localStorage.getItem(STORAGE_KEYS.entries);
        if (!raw) return [];

        try {
            const decoded = decode(raw);
            const parsed = safeJsonParse(decoded, []);
            if (!Array.isArray(parsed)) return [];
            return parsed.map(normalizeEntry).filter(Boolean);
        } catch (error) {
            return [];
        }
    }

    function getLocalUpdatedAt() {
        return localStorage.getItem(STORAGE_KEYS.localUpdatedAt) || '';
    }

    function isGoogleAutoSyncEnabled() {
        return localStorage.getItem(STORAGE_KEYS.googleAutoSyncEnabled) === 'true';
    }

    function setGoogleAutoSyncEnabled(enabled) {
        localStorage.setItem(STORAGE_KEYS.googleAutoSyncEnabled, enabled ? 'true' : 'false');
    }

    function getGoogleLoginHint() {
        return localStorage.getItem(STORAGE_KEYS.googleLoginHint) || '';
    }

    function setGoogleLoginHint(loginHint) {
        const normalized = String(loginHint || '').trim();
        if (normalized) {
            localStorage.setItem(STORAGE_KEYS.googleLoginHint, normalized);
            return;
        }
        localStorage.removeItem(STORAGE_KEYS.googleLoginHint);
    }

    function touchLocalUpdatedAt(timestamp) {
        const nextTimestamp = timestamp || new Date().toISOString();
        localStorage.setItem(STORAGE_KEYS.localUpdatedAt, nextTimestamp);
    }

    function saveEntries(nextEntries, options = {}) {
        entries = (Array.isArray(nextEntries) ? nextEntries : []).map(normalizeEntry).filter(Boolean);
        localStorage.setItem(STORAGE_KEYS.entries, encode(JSON.stringify(entries)));

        if (options.preserveTimestamp && options.timestamp) {
            touchLocalUpdatedAt(options.timestamp);
        } else if (!options.preserveTimestamp) {
            touchLocalUpdatedAt();
        }

        if (!options.skipCloud) {
            queueCloudBackup();
        }
    }

    function getCategories(type) {
        const fallback = type === 'income' ? [...defaultIncomeCategories] : [...defaultExpenseCategories];
        const raw = localStorage.getItem(`categories_${type}`);
        const parsed = raw ? safeJsonParse(raw, fallback) : fallback;
        if (!Array.isArray(parsed)) return fallback;

        const normalized = [...new Set(parsed.map(item => String(item || '').trim()).filter(Boolean))];
        return normalized.length ? normalized : fallback;
    }

    function saveCategories(type, categories, options = {}) {
        const normalized = [...new Set((Array.isArray(categories) ? categories : [])
            .map(item => String(item || '').trim())
            .filter(Boolean))];

        localStorage.setItem(`categories_${type}`, JSON.stringify(normalized));

        if (!options.preserveTimestamp) {
            touchLocalUpdatedAt();
        }

        if (!options.skipCloud) {
            queueCloudBackup();
        }
    }

    function getCurrentMonthKey() {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    }

    function getSelectedMonthKey() {
        return calendarInput.value || getCurrentMonthKey();
    }

    function getMonthEntries(monthKey) {
        return entries.filter(entry => entry.date.startsWith(monthKey));
    }

    function renderEntries(showAll = false) {
        entryList.innerHTML = '';

        let monthKey = calendarInput.value;
        if (!monthKey && !showAll) {
            monthKey = getCurrentMonthKey();
        }

        const searchKeyword = searchInput.value.trim().toLowerCase();
        const filtered = entries.filter(entry => {
            const matchMonth = showAll ? true : entry.date.startsWith(monthKey);
            const matchKeyword = !searchKeyword || entry.desc.toLowerCase().includes(searchKeyword);
            return matchMonth && matchKeyword;
        });

        const grouped = new Map();
        filtered.forEach(entry => {
            const key = `${entry.type}::${entry.category}`;
            if (!grouped.has(key)) {
                grouped.set(key, []);
            }
            grouped.get(key).push(entry);
        });

        const fragment = document.createDocumentFragment();

        Array.from(grouped.entries()).forEach(([key, groupEntries], index) => {
            const [groupType, groupCategory] = key.split('::');
            const subtotal = groupEntries.reduce((sum, item) => sum + item.amount, 0);
            const title = `${groupType === 'income' ? '收入' : '支出'} - ${groupCategory}（小計：$${subtotal}）`;
            const groupId = `group-${index}`;

            const header = document.createElement('li');
            header.style.background = '#ddd';
            header.style.padding = '10px';
            header.style.cursor = 'pointer';
            header.style.fontWeight = 'bold';
            header.textContent = title;
            header.addEventListener('click', () => toggleGroup(groupId));
            fragment.appendChild(header);

            const ul = document.createElement('ul');
            ul.id = groupId;
            ul.style.display = 'none';
            ul.style.paddingLeft = '1em';
            ul.style.listStyle = 'none';

            groupEntries.forEach(entry => {
                const entryIndex = entries.indexOf(entry);

                const li = document.createElement('li');
                li.className = 'entry';

                const textSpan = document.createElement('span');
                textSpan.append(`${entry.date} - ${entry.desc} (${entry.category}) `);

                const amountStrong = document.createElement('strong');
                amountStrong.className = entry.type;
                amountStrong.textContent = `${entry.type === 'income' ? '+' : '-'}$${entry.amount}`;
                textSpan.appendChild(amountStrong);

                const deleteBtn = document.createElement('span');
                deleteBtn.className = 'btn-del';
                deleteBtn.textContent = '刪除';
                deleteBtn.addEventListener('click', event => {
                    event.stopPropagation();
                    deleteEntry(entryIndex);
                });

                li.appendChild(textSpan);
                li.appendChild(deleteBtn);
                ul.appendChild(li);
            });

            fragment.appendChild(ul);
        });

        entryList.appendChild(fragment);

        const selectedMonthKey = getSelectedMonthKey();
        const monthEntries = getMonthEntries(selectedMonthKey);
        renderStats(selectedMonthKey, monthEntries);
        renderBalance();
        renderCategoryChart(monthEntries);
    }

    function toggleGroup(id) {
        const element = document.getElementById(id);
        if (!element) return;
        element.style.display = element.style.display === 'none' ? 'block' : 'none';
    }

    function colorForLabel(label) {
        let hash = 0;
        for (let index = 0; index < label.length; index += 1) {
            hash = label.charCodeAt(index) + ((hash << 5) - hash);
            hash |= 0;
        }
        const hue = Math.abs(hash) % 360;
        return `hsl(${hue}, 65%, 58%)`;
    }

    function renderCategoryChart(monthEntries) {
        const incomeData = {};
        const expenseData = {};

        monthEntries.forEach(entry => {
            const bucket = entry.type === 'income' ? incomeData : expenseData;
            bucket[entry.category] = (bucket[entry.category] || 0) + entry.amount;
        });

        const labels = [
            ...Object.keys(incomeData).map(category => `收入-${category}`),
            ...Object.keys(expenseData).map(category => `支出-${category}`)
        ];

        const data = [
            ...Object.values(incomeData),
            ...Object.values(expenseData)
        ];

        if (window.categoryChartInstance) {
            window.categoryChartInstance.destroy();
        }

        const chartContext = document.getElementById('categoryChart').getContext('2d');
        window.categoryChartInstance = new Chart(chartContext, {
            type: 'pie',
            data: {
                labels,
                datasets: [{
                    data,
                    backgroundColor: labels.map(label => colorForLabel(label))
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'bottom' },
                    tooltip: {
                        callbacks: {
                            label(context) {
                                return `${context.label}: $${context.raw}`;
                            }
                        }
                    }
                }
            }
        });
    }

    function clearCalendar() {
        calendarInput.value = '';
        renderEntries(true);
    }

    function renderStats(monthKey, monthEntries) {
        const summary = monthEntries.reduce((acc, entry) => {
            if (entry.type === 'income') {
                acc.income += entry.amount;
            } else {
                acc.expense += entry.amount;
            }
            return acc;
        }, { income: 0, expense: 0 });

        monthStatsShowEl.textContent = monthKey;
        statsBox.innerHTML = '';

        const incomeLine = document.createElement('div');
        incomeLine.innerHTML = `收入總和：<span class="income">$${summary.income}</span>`;

        const expenseLine = document.createElement('div');
        expenseLine.innerHTML = `支出總和：<span class="expense">$${summary.expense}</span>`;

        statsBox.appendChild(incomeLine);
        statsBox.appendChild(expenseLine);
    }

    function renderBalance() {
        const totals = entries.reduce((acc, entry) => {
            if (entry.type === 'income') {
                acc.income += entry.amount;
            } else {
                acc.expense += entry.amount;
            }
            return acc;
        }, { income: 0, expense: 0 });

        const balance = totals.income - totals.expense;
        totalBalanceEl.innerHTML = '';

        const incomeItem = document.createElement('li');
        incomeItem.innerHTML = `總收入：<span class="income">$${totals.income}</span>`;

        const expenseItem = document.createElement('li');
        expenseItem.innerHTML = `總支出：<span class="expense">$${totals.expense}</span>`;

        const balanceItem = document.createElement('li');
        balanceItem.innerHTML = `總餘額：<span style="color:${balance >= 0 ? 'green' : 'red'}">$${balance}</span>`;

        totalBalanceEl.appendChild(incomeItem);
        totalBalanceEl.appendChild(expenseItem);
        totalBalanceEl.appendChild(balanceItem);
    }

    function deleteEntry(index) {
        if (index < 0 || index >= entries.length) return;
        entries.splice(index, 1);
        saveEntries(entries);
        renderEntries();
    }

    function toSafeCsvCell(value) {
        const raw = String(value ?? '');
        const guarded = /^[=+\-@]/.test(raw) ? `'${raw}` : raw;
        const escaped = guarded.replace(/"/g, '""');
        return /[",\n]/.test(escaped) ? `"${escaped}"` : escaped;
    }

    function exportCSV() {
        const rows = [['日期', '描述', '金額', '類型', '分類']];

        entries.forEach(entry => {
            const typeData = entry.type === 'income' ? '收入' : '支出';
            rows.push([entry.date, entry.desc, entry.amount, typeData, entry.category]);
        });

        const csvContent = rows
            .map(row => row.map(toSafeCsvCell).join(','))
            .join('\n');

        const blob = new Blob([`\uFEFF${csvContent}`], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = '記帳紀錄.csv';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);
    }

    function updateCategoryOptions() {
        const type = typeSelect.value;
        const categories = getCategories(type);

        categorySelect.innerHTML = '';
        categories.forEach(category => {
            const option = document.createElement('option');
            option.value = category;
            option.textContent = category;
            categorySelect.appendChild(option);
        });
    }

    function addCategory() {
        const newCategory = document.getElementById('newCategory').value.trim();
        const currentType = newCategoryTypeSelect.value;
        if (!newCategory) return;

        const existingCategories = getCategories(currentType);
        if (existingCategories.includes(newCategory)) {
            alert('分類已存在！');
            return;
        }

        existingCategories.push(newCategory);
        saveCategories(currentType, existingCategories);
        updateCategoryOptions();
        renderCategoryManager();
        document.getElementById('newCategory').value = '';
    }

    function renderCategoryManager() {
        const type = manageTypeSelect.value;
        const list = document.getElementById('categoryManagerList');
        const categories = getCategories(type);

        list.innerHTML = '';

        categories.forEach((category, index) => {
            const container = document.createElement('div');
            container.className = 'item';

            const text = document.createElement('span');
            text.textContent = category;

            const deleteBtn = document.createElement('span');
            deleteBtn.className = 'btn-del';
            deleteBtn.style.marginLeft = '10px';
            deleteBtn.textContent = '刪除';
            deleteBtn.addEventListener('click', () => deleteCategory(type, index));

            container.appendChild(text);
            container.appendChild(deleteBtn);
            list.appendChild(container);
        });
    }

    function deleteCategory(type, index) {
        const categories = getCategories(type);
        const targetCategory = categories[index];
        if (!targetCategory) return;

        if (confirm(`確定刪除分類「${targetCategory}」？`)) {
            categories.splice(index, 1);
            saveCategories(type, categories);
            renderCategoryManager();
            if (typeSelect.value === type) updateCategoryOptions();
        }
    }

    function setCloudStatus(message, mode = '') {
        cloudStatusEl.textContent = message;
        cloudStatusEl.className = 'cloud-status';

        if (mode === 'ok') {
            cloudStatusEl.classList.add('status-ok');
        }
        if (mode === 'error') {
            cloudStatusEl.classList.add('status-error');
        }
    }

    function renderGoogleAccountInfo() {
        if (!currentGoogleUser) {
            googleAccountInfoEl.textContent = '目前帳號：尚未連線';
            return;
        }

        const accountLabel = currentGoogleUser.email || currentGoogleUser.name || currentGoogleUser.sub || '未知帳號';
        googleAccountInfoEl.textContent = `目前帳號：${accountLabel}`;
    }

    function buildBackupFileName(timestamp) {
        const safeTimestamp = (timestamp || new Date().toISOString())
            .replace(/[-:]/g, '')
            .replace(/\.\d{3}Z$/, 'Z');
        return `${CLOUD_BACKUP_FILE_PREFIX}${safeTimestamp}${CLOUD_BACKUP_FILE_SUFFIX}`;
    }

    function formatBackupLabel(file) {
        const sourceTimestamp = file.modifiedTime || file.createdTime || '';
        const parsed = sourceTimestamp ? new Date(sourceTimestamp) : null;
        const formattedTime = parsed && !Number.isNaN(parsed.getTime())
            ? parsed.toLocaleString('zh-TW', { hour12: false })
            : (file.name || '未知備份');
        return `${formattedTime} - ${file.name}`;
    }

    function renderCloudBackupOptions(files) {
        cloudBackupFiles = Array.isArray(files) ? files : [];
        cloudBackupSelectEl.innerHTML = '';

        if (!cloudBackupFiles.length) {
            const option = document.createElement('option');
            option.value = '';
            option.textContent = '尚無雲端備份';
            cloudBackupSelectEl.appendChild(option);
            return;
        }

        cloudBackupFiles.forEach((file, index) => {
            const option = document.createElement('option');
            option.value = file.id;
            option.textContent = formatBackupLabel(file);
            if (index === 0) {
                option.selected = true;
            }
            cloudBackupSelectEl.appendChild(option);
        });
    }

    function hasGoogleConfig() {
        return Boolean(GOOGLE_OAUTH_CLIENT_ID.trim() && GOOGLE_API_KEY.trim());
    }

    function waitForGoogleSdk(maxWaitMs = 10000) {
        return new Promise(resolve => {
            const startTime = Date.now();
            const timer = setInterval(() => {
                const sdkReady =
                    typeof window.gapi !== 'undefined' &&
                    typeof window.google !== 'undefined' &&
                    window.google.accounts &&
                    window.google.accounts.oauth2;

                if (sdkReady) {
                    clearInterval(timer);
                    resolve(true);
                    return;
                }

                if (Date.now() - startTime > maxWaitMs) {
                    clearInterval(timer);
                    resolve(false);
                }
            }, 100);
        });
    }

    function initGapiClient() {
        const apiKey = GOOGLE_API_KEY.trim();
        return new Promise((resolve, reject) => {
            window.gapi.load('client', {
                callback: async () => {
                    try {
                        await window.gapi.client.init({
                            apiKey,
                            discoveryDocs: [GOOGLE_DISCOVERY_DOC]
                        });
                        gapiClientReady = true;
                        resolve(true);
                    } catch (error) {
                        reject(error);
                    }
                },
                onerror: () => reject(new Error('Google API 載入失敗')),
                timeout: 10000,
                ontimeout: () => reject(new Error('Google API 載入逾時'))
            });
        });
    }

    async function ensureGoogleReady() {
        if (!hasGoogleConfig()) {
            setCloudStatus('請先在 index.html 填入 Google OAuth Client ID 與 Google API Key。', 'error');
            return false;
        }

        const sdkLoaded = await waitForGoogleSdk();
        if (!sdkLoaded) {
            setCloudStatus('Google SDK 尚未載入完成，請稍後再試。', 'error');
            return false;
        }

        if (!gapiClientReady) {
            try {
                await initGapiClient();
            } catch (error) {
                setCloudStatus(`Google 初始化失敗：${error.message || '未知錯誤'}`, 'error');
                return false;
            }
        }

        const clientId = GOOGLE_OAUTH_CLIENT_ID.trim();
        if (!tokenClient || tokenClientClientId !== clientId) {
            tokenClient = window.google.accounts.oauth2.initTokenClient({
                client_id: clientId,
                scope: GOOGLE_DRIVE_SCOPE,
                callback: () => {}
            });
            tokenClientClientId = clientId;
        }

        return true;
    }

    function requestGoogleAccessToken(promptMode, overrideConfig = {}) {
        return new Promise((resolve, reject) => {
            if (!tokenClient) {
                reject(new Error('Google OAuth 尚未初始化'));
                return;
            }

            tokenClient.callback = response => {
                if (response.error) {
                    reject(new Error(response.error));
                    return;
                }

                accessToken = response.access_token;
                window.gapi.client.setToken({ access_token: accessToken });
                resolve(response);
            };

            tokenClient.requestAccessToken({
                prompt: promptMode,
                ...overrideConfig
            });
        });
    }

    async function fetchGoogleUserInfo() {
        if (!accessToken) {
            currentGoogleUser = null;
            renderGoogleAccountInfo();
            return null;
        }

        const response = await fetch(GOOGLE_USERINFO_ENDPOINT, {
            headers: {
                Authorization: `Bearer ${accessToken}`
            }
        });

        if (!response.ok) {
            throw new Error('無法取得目前 Google 帳號資訊');
        }

        currentGoogleUser = await response.json();
        setGoogleLoginHint(currentGoogleUser.email || currentGoogleUser.sub || '');
        renderGoogleAccountInfo();
        return currentGoogleUser;
    }

    function clearGoogleSession() {
        accessToken = '';
        currentGoogleUser = null;
        autoCloudBackupEnabled = false;
        if (window.gapi?.client) {
            window.gapi.client.setToken(null);
        }
        renderGoogleAccountInfo();
    }

    function revokeGoogleAccessToken() {
        return new Promise(resolve => {
            if (!accessToken || !window.google?.accounts?.oauth2?.revoke) {
                resolve(false);
                return;
            }

            window.google.accounts.oauth2.revoke(accessToken, () => {
                resolve(true);
            });
        });
    }

    async function findCloudBackupFolder() {
        const response = await window.gapi.client.drive.files.list({
            spaces: 'drive',
            q: `name='${CLOUD_BACKUP_FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`,
            fields: 'files(id,name)',
            pageSize: 1
        });

        const folder = response?.result?.files?.[0] || null;
        cloudFolderId = folder ? folder.id : null;
        return folder;
    }

    async function createCloudBackupFolder() {
        const response = await window.gapi.client.drive.files.create({
            fields: 'id,name',
            resource: {
                name: CLOUD_BACKUP_FOLDER_NAME,
                mimeType: 'application/vnd.google-apps.folder'
            }
        });

        cloudFolderId = response?.result?.id || null;
        return response?.result || null;
    }

    async function ensureCloudBackupFolder() {
        if (cloudFolderId) {
            return cloudFolderId;
        }

        const existingFolder = await findCloudBackupFolder();
        if (existingFolder?.id) {
            return existingFolder.id;
        }

        const createdFolder = await createCloudBackupFolder();
        if (!createdFolder?.id) {
            throw new Error('無法建立 Google Drive 備份資料夾');
        }

        return createdFolder.id;
    }

    async function listCloudBackupFiles(limit = 15) {
        const folderId = await ensureCloudBackupFolder();
        const response = await window.gapi.client.drive.files.list({
            spaces: 'drive',
            q: `name contains '${CLOUD_BACKUP_FILE_PREFIX}' and '${folderId}' in parents and trashed=false`,
            fields: 'files(id,name,modifiedTime,createdTime)',
            orderBy: 'createdTime desc',
            pageSize: limit
        });

        const files = response?.result?.files || [];
        cloudFileId = files[0]?.id || null;
        return files;
    }

    function buildCloudPayload() {
        return {
            version: 1,
            updatedAt: getLocalUpdatedAt() || new Date().toISOString(),
            entries,
            categories: {
                income: getCategories('income'),
                expense: getCategories('expense')
            }
        };
    }

    function applyCloudPayload(payload) {
        if (!payload || typeof payload !== 'object') {
            throw new Error('雲端備份格式錯誤');
        }

        const restoredEntries = Array.isArray(payload.entries)
            ? payload.entries.map(normalizeEntry).filter(Boolean)
            : [];

        const incomeCategories = Array.isArray(payload.categories?.income)
            ? payload.categories.income
            : getCategories('income');

        const expenseCategories = Array.isArray(payload.categories?.expense)
            ? payload.categories.expense
            : getCategories('expense');

        saveCategories('income', incomeCategories, { skipCloud: true, preserveTimestamp: true });
        saveCategories('expense', expenseCategories, { skipCloud: true, preserveTimestamp: true });
        saveEntries(restoredEntries, {
            skipCloud: true,
            preserveTimestamp: true,
            timestamp: payload.updatedAt
        });

        touchLocalUpdatedAt(payload.updatedAt || new Date().toISOString());
        updateCategoryOptions();
        renderCategoryManager();
        renderEntries();
    }

    function buildMultipartBody(metadata, content) {
        const boundary = 'ledger-boundary-3141592653';
        const delimiter = `\r\n--${boundary}\r\n`;
        const closeDelimiter = `\r\n--${boundary}--`;

        const body =
            delimiter +
            'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
            JSON.stringify(metadata) +
            delimiter +
            'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
            content +
            closeDelimiter;

        return { body, boundary };
    }

    async function uploadCloudPayload(payload) {
        const folderId = await ensureCloudBackupFolder();
        const metadata = {
            name: buildBackupFileName(payload.updatedAt),
            parents: [folderId]
        };

        const { body, boundary } = buildMultipartBody(metadata, JSON.stringify(payload));

        const response = await window.gapi.client.request({
            path: 'https://www.googleapis.com/upload/drive/v3/files',
            method: 'POST',
            params: { uploadType: 'multipart', fields: 'id,modifiedTime' },
            headers: { 'Content-Type': `multipart/related; boundary=${boundary}` },
            body
        });

        cloudFileId = response?.result?.id || cloudFileId;
        return response?.result;
    }

    async function downloadCloudPayload(fileId) {
        const targetFileId = fileId || cloudBackupSelectEl.value;
        if (!targetFileId) return null;

        const response = await window.gapi.client.drive.files.get({
            fileId: targetFileId,
            alt: 'media'
        });

        let payload = response?.result;
        if (typeof payload === 'string') {
            payload = safeJsonParse(payload, null);
        }

        return payload;
    }

    async function backupToCloud(successText) {
        if (!autoCloudBackupEnabled || !accessToken) {
            return;
        }

        if (cloudSyncInProgress) {
            return;
        }

        cloudSyncInProgress = true;
        try {
            const payload = buildCloudPayload();
            await uploadCloudPayload(payload);
            renderCloudBackupOptions(await listCloudBackupFiles());
            setCloudStatus(successText || '已同步到 Google Drive。', 'ok');
        } catch (error) {
            setCloudStatus(`雲端同步失敗：${error.message || '未知錯誤'}`, 'error');
        } finally {
            cloudSyncInProgress = false;
        }
    }

    async function refreshCloudBackupOptions() {
        if (!autoCloudBackupEnabled || !accessToken) {
            renderCloudBackupOptions([]);
            return;
        }

        try {
            renderCloudBackupOptions(await listCloudBackupFiles());
        } catch (error) {
            renderCloudBackupOptions([]);
            setCloudStatus(`讀取雲端備份清單失敗：${error.message || '未知錯誤'}`, 'error');
        }
    }

    function queueCloudBackup() {
        if (!autoCloudBackupEnabled) {
            return;
        }

        clearTimeout(cloudBackupTimer);
        cloudBackupTimer = setTimeout(() => {
            backupToCloud('已自動備份到 Google Drive。');
        }, 1200);
    }

    function parseTimestamp(timestamp) {
        if (!timestamp) return 0;
        const millis = Date.parse(timestamp);
        return Number.isNaN(millis) ? 0 : millis;
    }

    async function restoreFromCloud(force = false, fileId = '') {
        if (!autoCloudBackupEnabled || !accessToken) {
            setCloudStatus('請先連線 Google 才能還原。', 'error');
            return;
        }

        try {
            const selectedFileId = fileId || cloudBackupSelectEl.value;
            if (!selectedFileId) {
                setCloudStatus('雲端尚無可還原資料。');
                return;
            }

            const cloudPayload = await downloadCloudPayload(selectedFileId);
            if (!cloudPayload) {
                setCloudStatus('雲端尚無可還原資料。');
                return;
            }

            const cloudUpdatedAt = parseTimestamp(cloudPayload.updatedAt);
            const localUpdatedAt = parseTimestamp(getLocalUpdatedAt());
            const localHasData = entries.length > 0;

            if (!force && localHasData && cloudUpdatedAt <= localUpdatedAt) {
                setCloudStatus('本機資料較新，略過雲端還原。');
                return;
            }

            applyCloudPayload(cloudPayload);
            await refreshCloudBackupOptions();
            setCloudStatus('已從 Google Drive 還原資料。', 'ok');
        } catch (error) {
            setCloudStatus(`雲端還原失敗：${error.message || '未知錯誤'}`, 'error');
        }
    }

    async function connectGoogleAndEnableAutoBackup() {
        const ready = await ensureGoogleReady();
        if (!ready) return;

        try {
            setCloudStatus('正在向 Google 要求授權...');
            const loginHint = getGoogleLoginHint();
            await requestGoogleAccessToken('', loginHint ? { login_hint: loginHint } : {});
            await fetchGoogleUserInfo();

            autoCloudBackupEnabled = true;
            setGoogleAutoSyncEnabled(true);
            setCloudStatus('Google 授權成功，正在比對雲端資料...');

            await refreshCloudBackupOptions();
            await restoreFromCloud();
            await backupToCloud('連線完成，已同步目前資料。');
        } catch (error) {
            clearGoogleSession();
            setCloudStatus(`Google 授權失敗：${error.message || '未知錯誤'}`, 'error');
        }
    }

    async function tryRestoreGoogleSessionSilently() {
        if (!hasGoogleConfig() || !isGoogleAutoSyncEnabled()) {
            return false;
        }

        const ready = await ensureGoogleReady();
        if (!ready) return false;

        try {
            setCloudStatus('正在自動恢復 Google 連線...');
            const loginHint = getGoogleLoginHint();
            await requestGoogleAccessToken('none', loginHint ? { login_hint: loginHint } : {});
            await fetchGoogleUserInfo();
            autoCloudBackupEnabled = true;
            await refreshCloudBackupOptions();
            await restoreFromCloud();
            await backupToCloud('已自動恢復 Google 連線並完成同步。');
            return true;
        } catch (error) {
            clearGoogleSession();
            setCloudStatus('無法自動恢復 Google 連線，請手動按一次「連線 Google 並啟用自動備份」。');
            return false;
        }
    }

    async function disconnectGoogleAutoSync() {
        setGoogleAutoSyncEnabled(false);
        setGoogleLoginHint('');

        try {
            setCloudStatus('正在中斷 Google 自動同步...');
            await revokeGoogleAccessToken();
            clearGoogleSession();
            renderCloudBackupOptions([]);
            setCloudStatus('已中斷自動同步並清除目前 Google 授權狀態。');
        } catch (error) {
            clearGoogleSession();
            renderCloudBackupOptions([]);
            setCloudStatus('已清除本機自動同步狀態，但撤銷 Google 授權時發生問題。', 'error');
        }
    }

    form.addEventListener('submit', event => {
        event.preventDefault();

        const desc = descInput.value.trim();
        const amount = Number(amountInput.value);
        const type = typeSelect.value;
        const category = categorySelect.value;
        const date = dateInput.value || new Date().toISOString().slice(0, 10);

        if (!desc || !Number.isFinite(amount)) {
            return;
        }

        entries.push({ desc, amount, type, category, date });
        saveEntries(entries);
        renderEntries();

        descInput.value = '';
        amountInput.value = '';
    });

    calendarInput.addEventListener('change', () => renderEntries());
    searchInput.addEventListener('input', () => renderEntries());
    typeSelect.addEventListener('change', updateCategoryOptions);
    manageTypeSelect.addEventListener('change', renderCategoryManager);

    document.getElementById('showAllBtn').addEventListener('click', clearCalendar);
    document.getElementById('addCategoryBtn').addEventListener('click', addCategory);
    document.getElementById('exportCsvBtn').addEventListener('click', exportCSV);
    document.getElementById('googleConnectBtn').addEventListener('click', connectGoogleAndEnableAutoBackup);
    document.getElementById('googleDisconnectBtn').addEventListener('click', disconnectGoogleAutoSync);
    document.getElementById('syncNowBtn').addEventListener('click', () => backupToCloud('已手動同步到 Google Drive。'));
    document.getElementById('restoreFromCloudBtn').addEventListener('click', async () => {
        if (!cloudBackupSelectEl.value) {
            setCloudStatus('請先選擇要還原的雲端備份。', 'error');
            return;
        }
        if (!confirm('從選取的雲端備份還原會覆蓋目前本機資料，是否繼續？')) {
            return;
        }
        await restoreFromCloud(true);
    });

    if (!getLocalUpdatedAt()) {
        touchLocalUpdatedAt();
    }

    localStorage.removeItem('google_client_id');
    localStorage.removeItem('google_api_key');

    calendarInput.value = getCurrentMonthKey();
    dateInput.value = new Date().toISOString().slice(0, 10);

    updateCategoryOptions();
    renderCategoryManager();
    renderEntries();
    renderGoogleAccountInfo();

    if (hasGoogleConfig()) {
        if (isGoogleAutoSyncEnabled()) {
            setCloudStatus('已載入，正在嘗試自動恢復 Google 連線...');
            setTimeout(() => {
                tryRestoreGoogleSessionSilently();
            }, 0);
        } else {
            setCloudStatus('已載入，請按「連線 Google 並啟用自動備份」。');
        }
    } else {
        setCloudStatus('請先在 index.html 填入 Google OAuth Client ID 與 Google API Key。');
    }

    let lastActivity = Date.now();
    const INACTIVITY_LIMIT = 5 * 60 * 1000;

    function resetActivity() {
        lastActivity = Date.now();
    }

    ['mousemove', 'keydown', 'mousedown', 'touchstart'].forEach(eventName => {
        document.addEventListener(eventName, resetActivity, { passive: true });
    });

    setInterval(() => {
        if (Date.now() - lastActivity > INACTIVITY_LIMIT) {
            location.reload();
        }
    }, 60000);

    let hiddenAt = 0;
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') {
            hiddenAt = Date.now();
        } else if (hiddenAt && Date.now() - hiddenAt > INACTIVITY_LIMIT) {
            location.reload();
        }
    });
</script>
</body>
</html>
